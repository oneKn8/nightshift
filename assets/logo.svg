  <circle cx="66" cy="46" r="5" fill="#0a0a1a"/>
  <!-- Eye shine -->
  <circle cx="40" cy="44" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="68" cy="44" r="2.5" fill="white" opacity="0.8"/>
  <!-- Beak -->
