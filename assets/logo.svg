  <path d="M 26 28 Q 30 10 38 24" fill="#312e81"/>
  <path d="M 74 28 Q 70 10 62 24" fill="#312e81"/>
  <!-- Eye sockets -->
  <circle cx="36" cy="48" r="14" fill="#1e1b4b"/>
  <circle cx="64" cy="48" r="14" fill="#1e1b4b"/>
  <!-- Iris -->
  <circle cx="36" cy="48" r="10" fill="#fbbf24"/>
  <circle cx="64" cy="48" r="10" fill="#fbbf24"/>
  <!-- Pupil -->
